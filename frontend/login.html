<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miranet - Portal de Soporte Técnico (Login)</title>
    <!-- Google Fonts: Outfit for clean engineering interface vibe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050b18;
            --bg-secondary: #0a1128;
            --bg-card: rgba(10, 20, 47, 0.7);
            --border-glow: rgba(0, 240, 255, 0.2);
            --border-active: #00f0ff;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --cyan-glow: rgba(0, 240, 255, 0.4);
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 240, 255, 0.08) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 74, 173, 0.15) 0, transparent 50%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle cyber grid backdrop */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            pointer-events: none;
            z-index: 1;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        0 0 25px rgba(0, 240, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
            overflow: hidden;
        }

        /* Ambient top cyan indicator line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--border-active), transparent);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--border-active);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            margin-bottom: 15px;
        }

        .logo svg {
            width: 26px;
            height: 26px;
            fill: var(--border-active);
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            text-shadow: 0 0 10px rgba(248, 250, 252, 0.1);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 5px;
            cursor: pointer;
            position: relative;
            outline: none;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--border-active);
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border-active);
            box-shadow: 0 0 8px var(--border-active);
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: var(--text-muted);
            fill: none;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: rgba(5, 11, 24, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 14px 14px 14px 42px;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
            background: rgba(5, 11, 24, 0.8);
        }

        /* Focus icon state change */
        .form-input:focus ~ .input-icon {
            stroke: var(--border-active);
            filter: drop-shadow(0 0 2px var(--border-active));
        }

        .input-panel {
            display: none;
        }

        .input-panel.active {
            display: block;
            animation: fadeIn 0.25s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            color: var(--danger-color);
            font-size: 13px;
            margin-top: 6px;
            display: none;
            align-items: center;
            gap: 5px;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, #0052d4, #4364f7, #6fb1fc);
            background-size: 200% auto;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            padding: 15px;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(67, 100, 247, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            background-position: right center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4),
                        0 5px 15px rgba(67, 100, 247, 0.5);
            border-color: var(--border-active);
            transform: translateY(-1px);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(67, 100, 247, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            background: rgba(67, 100, 247, 0.2);
            border-color: rgba(255, 255, 255, 0.05);
            box-shadow: none;
            color: var(--text-secondary);
        }

        /* Custom Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .footer-note a {
            color: var(--border-active);
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <!-- Header section with branding -->
            <div class="header">
                <div class="logo">
                    <svg viewBox="0 0 24 24">
                        <!-- Custom futuristic antenna signal node SVG -->
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <h2 class="title">Miranet</h2>
                <p class="subtitle">Portal de Soporte Técnico</p>
            </div>

            <!-- Interative Access Tabs -->
            <div class="tabs">
                <button type="button" class="tab-btn active" id="tab-dni" onclick="switchTab('dni')">Acceso por DNI</button>
                <button type="button" class="tab-btn" id="tab-router" onclick="switchTab('router')">Acceso por Router S/N</button>
            </div>

            <!-- Form panels -->
            <form id="login-form" onsubmit="handleLogin(event)" novalidate>
                
                <!-- Panel 1: Acceso por DNI -->
                <div class="input-panel active" id="panel-dni">
                    <div class="form-group">
                        <label class="form-label" for="input-dni">Identificación del Cliente</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="input-dni" 
                                class="form-input" 
                                placeholder="Ingrese DNI del cliente..."
                                inputmode="numeric"
                                maxlength="8"
                                oninput="validateDniInput(this)"
                            >
                            <!-- User card SVG icon -->
                            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <div class="error-message" id="error-dni">Por favor, ingrese un DNI válido de 8 dígitos.</div>
                    </div>
                </div>

                <!-- Panel 2: Acceso por Router S/N -->
                <div class="input-panel" id="panel-router">
                    <div class="form-group">
                        <label class="form-label" for="input-router">Número de Serie del Equipo</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="input-router" 
                                class="form-input" 
                                placeholder="Ingrese Número de Serie del Router (CPE)..."
                                oninput="clearError('router')"
                            >
                            <!-- Router/Network SVG icon -->
                            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                                <line x1="6" y1="6" x2="6.01" y2="6"></line>
                                <line x1="10" y1="6" x2="10.01" y2="6"></line>
                                <line x1="6" y1="18" x2="6.01" y2="18"></line>
                                <line x1="10" y1="18" x2="10.01" y2="18"></line>
                            </svg>
                        </div>
                        <div class="error-message" id="error-router">Por favor, ingrese el número de serie del router.</div>
                    </div>
                </div>

                <!-- Main Action Button -->
                <button type="submit" class="btn-submit" id="btn-submit">
                    <span class="spinner" id="btn-spinner"></span>
                    <span id="btn-text">Verificar Conexión</span>
                </button>
            </form>

            <div class="footer-note">
                Soporte de Red Miranet SAC &copy; 2026. <br>
                ¿Necesita ayuda? <a href="#">Contacte a Central de Operaciones</a>
            </div>
        </div>
    </div>

    <script>
        let currentMethod = 'dni'; // Current active tab

        // Toggle authentication tabs
        function switchTab(method) {
            if (method === currentMethod) return;
            currentMethod = method;

            // Update Tab Button styles
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${method}`).classList.add('active');

            // Update input panels visibility
            document.querySelectorAll('.input-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`panel-${method}`).classList.add('active');

            // Reset inputs and error messages
            document.getElementById('input-dni').value = '';
            document.getElementById('input-router').value = '';
            document.querySelectorAll('.error-message').forEach(err => err.style.display = 'none');
        }

        // Restrict DNI input to numbers only
        function validateDniInput(input) {
            input.value = input.value.replace(/\D/g, ''); // strip non-digits
            clearError('dni');
        }

        function clearError(method) {
            document.getElementById(`error-${method}`).style.display = 'none';
        }

        // Handle login verification simulation
        function handleLogin(event) {
            event.preventDefault();

            const btnSubmit = document.getElementById('btn-submit');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('btn-text');

            let isValid = true;
            let payload = {};

            if (currentMethod === 'dni') {
                const dniVal = document.getElementById('input-dni').value.trim();
                const dniError = document.getElementById('error-dni');
                
                if (dniVal.length !== 8) {
                    dniError.style.display = 'block';
                    isValid = false;
                } else {
                    payload = { type: 'DNI', value: dniVal };
                }
            } else {
                const routerVal = document.getElementById('input-router').value.trim();
                const routerError = document.getElementById('error-router');

                if (!routerVal) {
                    routerError.style.display = 'block';
                    isValid = false;
                } else {
                    payload = { type: 'RouterSN', value: routerVal };
                }
            }

            if (!isValid) return;

            // Trigger loading state for 2 seconds
            btnSubmit.disabled = true;
            btnSpinner.style.display = 'block';
            btnText.textContent = 'Verificando...';

            console.log(`[Miranet Authentication] Initiating connection verification callback...`, payload);

            setTimeout(() => {
                // Restore original state and simulation log success
                btnSubmit.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.textContent = 'Verificar Conexión';
                
                console.log(`[Miranet Authentication] Successful simulation verify response for:`, payload);
                alert(`Conexión verificada con éxito para el acceso: ${payload.value}`);
            }, 2000);
        }
    </script>
</body>
</html>
